{% extends "base.html" %}
{% from "_formhelpers.html" import page_header %}
{% block title %}Settings — Aula{% endblock %}
{% block content %}
{{ page_header("Institution Settings", "The referencing style here is applied across every feature.") }}
<form method="POST" class="bg-white border border-slate-200 rounded-xl p-5 space-y-4 max-w-xl">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Institution name</label>
    <input name="name" value="{{ inst.name if inst }}"
           class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-teal focus:outline-none">
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">House referencing style</label>
    <select name="referencing_style"
            class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-teal focus:outline-none">
      {% for s in ['APA', 'Harvard', 'MLA', 'Chicago', 'IEEE', 'Vancouver'] %}
        <option value="{{ s }}" {{ 'selected' if inst and inst.referencing_style==s }}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <button class="bg-navy text-white px-5 py-2 rounded font-medium">Save settings</button>
</form>
{% endblock %}
