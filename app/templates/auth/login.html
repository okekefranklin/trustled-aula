{% extends "base.html" %}
{% block title %}Sign in — TrustLed Aula{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-slate-200 p-8">
    <div class="text-center mb-6">
      <div class="text-2xl font-bold text-navy">TrustLed <span class="text-teal">Aula</span></div>
      <p class="text-sm text-slate-500 mt-1">The governed AI platform for universities</p>
    </div>
    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input name="email" type="email" required
               class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-teal focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input name="password" type="password" required
               class="w-full border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-teal focus:outline-none">
      </div>
      <button class="w-full bg-navy hover:bg-navy/90 text-white py-2 rounded font-medium">Sign in</button>
    </form>
    <p class="text-xs text-slate-400 mt-6 text-center">
      Accounts are issued by your institution's administrator.
    </p>
  </div>
</div>
{% endblock %}
